<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Calendar 2026</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="app">
        <section class="brand-row">
            <div class="brand-block">
                <div>
                    <h1 class="brand-title">F1 Calendar 2026</h1>
                    <p class="brand-subtitle">Races, Qualifying & Practice Sessions</p>
                </div>
            </div>
        </section>

        <section class="timezone-banner">
            <span>Showing times for: <a id="timezone-label" href="#" aria-label="Timezone label">Local timezone</a>.</span>
            <button class="gear-button" id="toggle-timezone" type="button" aria-label="Timezone settings">Edit</button>
        </section>

        <form class="timezone-editor" id="timezone-editor">
            <label for="tz">Timezone</label>
            <select id="tz">
                <option value="">Browser local timezone</option>
                <option value="America/Sao_Paulo">America/Sao_Paulo</option>
                <option value="America/New_York">America/New_York</option>
                <option value="America/Los_Angeles">America/Los_Angeles</option>
                <option value="Europe/London">Europe/London</option>
                <option value="Europe/Paris">Europe/Paris</option>
                <option value="Europe/Berlin">Europe/Berlin</option>
                <option value="Europe/Rome">Europe/Rome</option>
                <option value="Europe/Madrid">Europe/Madrid</option>
                <option value="Asia/Tokyo">Asia/Tokyo</option>
                <option value="Asia/Singapore">Asia/Singapore</option>
                <option value="Asia/Dubai">Asia/Dubai</option>
                <option value="Australia/Melbourne">Australia/Melbourne</option>
                <option value="UTC">UTC</option>
            </select>
            <button id="refresh" type="submit">Apply</button>
        </form>

        <div class="status" id="status"></div>
        <p class="schedule-meta" id="schedule-meta"></p>
        <section class="schedule-list" id="races"></section>
    </div>

    <script src="./app.js"></script>
</body>
</html>
