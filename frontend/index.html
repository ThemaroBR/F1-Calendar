<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Calendar 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #15151e;
            --panel: #2f2f37;
            --panel-2: #5a0f13;
            --accent: #e10600;
            --line: rgba(255, 255, 255, 0.12);
            --text: #f4f4f8;
            --muted: #c8c8d4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--text);
            font-family: "Rajdhani", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 18% -10%, rgba(225, 6, 0, 0.16), transparent 34%),
                radial-gradient(circle at 82% 0%, rgba(90, 15, 19, 0.34), transparent 36%),
                var(--bg);
        }

        .app {
            max-width: 1080px;
            margin: 0 auto;
            padding: 14px 24px 56px;
        }

        .brand-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-block {
            width: 100%;
        }

        .brand-title {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font: 800 54px/1 "Orbitron", sans-serif;
            text-shadow: 0 0 18px rgba(225, 6, 0, 0.35);
        }

        .brand-subtitle {
            margin: 10px 0 0;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--muted);
            font: 700 20px/1.1 "Rajdhani", sans-serif;
        }

        .timezone-banner {
            border-radius: 8px;
            background: var(--panel-2);
            min-height: 56px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            font: 600 17px/1 "Rajdhani", sans-serif;
            border: 1px solid rgba(225, 6, 0, 0.35);
        }

        .timezone-banner a {
            color: #fff;
            font-weight: 700;
            text-decoration: underline;
        }

        .gear-button {
            width: 34px;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 7px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .timezone-editor {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--panel);
            padding: 10px;
        }

        .timezone-editor.active {
            display: flex;
        }

        .timezone-editor label {
            font-size: 14px;
            font-weight: 700;
        }

        .timezone-editor select {
            flex: 1;
            min-width: 200px;
            height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 7px;
            padding: 0 10px;
            color: var(--text);
            background: var(--bg);
            font: 600 16px/1 "Rajdhani", sans-serif;
        }

        .timezone-editor button {
            height: 36px;
            border: 0;
            border-radius: 7px;
            padding: 0 14px;
            background: var(--accent);
            color: #fff;
            font: 700 15px/1 "Rajdhani", sans-serif;
            cursor: pointer;
        }

        .status {
            min-height: 24px;
            color: #ffb8b8;
            font: 600 16px/1 "Rajdhani", sans-serif;
            margin-bottom: 8px;
        }

        .schedule-meta {
            margin: 0 0 10px;
            color: var(--muted);
            font: 600 14px/1 "Rajdhani", sans-serif;
        }

        .schedule-list {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, var(--panel), #26262f);
            border-radius: 8px;
            overflow: hidden;
        }

        .race-block + .race-block {
            border-top: 1px solid var(--line);
        }

        .race-summary {
            list-style: none;
            min-height: 58px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .race-summary::-webkit-details-marker {
            display: none;
        }

        .race-main {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .caret {
            width: 14px;
            color: #d3daea;
            font-size: 11px;
            text-align: center;
        }

        .race-name {
            color: #ffffff;
            font: 700 28px/1 "Rajdhani", sans-serif;
        }

        .next-badge {
            margin-left: 8px;
            border-radius: 4px;
            background: var(--accent);
            color: #fff;
            padding: 2px 8px;
            font: 700 12px/1 "Rajdhani", sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .race-meta {
            color: var(--muted);
            font: 600 14px/1 "Rajdhani", sans-serif;
            text-align: right;
            white-space: nowrap;
            padding-left: 8px;
        }

        .session-row {
            display: grid;
            grid-template-columns: 1fr 112px 90px;
            min-height: 52px;
            align-items: center;
            padding: 0 14px 0 40px;
            border-top: 1px solid var(--line);
            font: 600 15px/1 "Rajdhani", sans-serif;
        }

        .session-name {
            color: var(--text);
        }

        .session-date,
        .session-time {
            color: var(--muted);
        }

        .empty-state {
            padding: 18px 14px;
            color: var(--muted);
            font: 600 15px/1.3 "Rajdhani", sans-serif;
        }

        @media (max-width: 900px) {
            .app {
                padding: 14px 12px 90px;
            }

            .brand-row {
                margin-bottom: 14px;
            }

            .brand-title {
                font-size: 38px;
            }

            .timezone-banner {
                font-size: 15px;
            }

            .race-summary {
                flex-wrap: wrap;
                align-items: center;
                padding: 10px 14px;
            }

            .race-main {
                width: 100%;
            }

            .race-meta {
                width: 100%;
                text-align: left;
                padding-left: 24px;
            }

            .session-row {
                grid-template-columns: 1fr;
                gap: 4px;
                padding: 8px 14px 8px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <section class="brand-row">
            <div class="brand-block">
                <div>
                    <h1 class="brand-title">F1 Calendar 2026</h1>
                    <p class="brand-subtitle">Races, Qualifying & Practice Sessions</p>
                </div>
            </div>
        </section>

        <section class="timezone-banner">
            <span>Showing times for: <a id="timezone-label" href="#" aria-label="Timezone label">Local timezone</a>.</span>
            <button class="gear-button" id="toggle-timezone" type="button" aria-label="Timezone settings">Edit</button>
        </section>

        <form class="timezone-editor" id="timezone-editor">
            <label for="tz">Timezone</label>
            <select id="tz">
                <option value="">Browser local timezone</option>
                <option value="America/Sao_Paulo">America/Sao_Paulo</option>
                <option value="America/New_York">America/New_York</option>
                <option value="America/Los_Angeles">America/Los_Angeles</option>
                <option value="Europe/London">Europe/London</option>
                <option value="Europe/Paris">Europe/Paris</option>
                <option value="Europe/Berlin">Europe/Berlin</option>
                <option value="Europe/Rome">Europe/Rome</option>
                <option value="Europe/Madrid">Europe/Madrid</option>
                <option value="Asia/Tokyo">Asia/Tokyo</option>
                <option value="Asia/Singapore">Asia/Singapore</option>
                <option value="Asia/Dubai">Asia/Dubai</option>
                <option value="Australia/Melbourne">Australia/Melbourne</option>
                <option value="UTC">UTC</option>
            </select>
            <button id="refresh" type="submit">Apply</button>
        </form>

        <div class="status" id="status"></div>
        <p class="schedule-meta" id="schedule-meta"></p>
        <section class="schedule-list" id="races"></section>
    </div>

    <script>
        const apiBase = 'http://127.0.0.1:8000';
        const SESSION_LABELS = {
            FP1: 'Free Practice 1',
            FP2: 'Free Practice 2',
            FP3: 'Free Practice 3',
            Race: 'Race',
            Qualifying: 'Qualifying',
            Sprint: 'Sprint',
            'Sprint Qualifying': 'Sprint Qualifying'
        };
        const SESSION_PRIORITY = {
            'Free Practice 1': 1,
            'Free Practice 2': 2,
            'Free Practice 3': 3,
            'Sprint Qualifying': 4,
            Sprint: 5,
            Qualifying: 6,
            Race: 7
        };

        const timezoneLabel = document.getElementById('timezone-label');
        const timezoneEditor = document.getElementById('timezone-editor');
        const timezoneSelect = document.getElementById('tz');
        const statusEl = document.getElementById('status');
        const scheduleMeta = document.getElementById('schedule-meta');
        const racesEl = document.getElementById('races');

        function formatDateParts(value) {
            const date = new Date(value);
            return {
                day: date.toLocaleString([], { month: 'short', day: '2-digit' }),
                time: date.toLocaleString([], { hour: '2-digit', minute: '2-digit', hour12: false })
            };
        }

        function getTimezoneValue() {
            return timezoneSelect.value.trim();
        }

        function getDisplayTimezone() {
            const selected = getTimezoneValue();
            if (selected) {
                return selected;
            }
            return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
        }

        function updateTimezoneLabel() {
            timezoneLabel.textContent = getDisplayTimezone();
        }

        function apiUrl(path) {
            const url = new URL(apiBase + path);
            const tz = getTimezoneValue();
            if (tz) {
                url.searchParams.set('tz', tz);
            }
            return url;
        }

        function normalizeSessionLabel(label) {
            return SESSION_LABELS[label] || label;
        }

        function sessionOrder(name) {
            return SESSION_PRIORITY[name] || 99;
        }

        function setStatus(message) {
            statusEl.textContent = message;
        }

        function formatWeekendDate(value) {
            const date = new Date(value);
            return date.toLocaleDateString([], { month: 'short', day: '2-digit' });
        }

        function updateScheduleMeta(count) {
            scheduleMeta.textContent = `Showing ${count} race weekends for 2026`;
        }

        function renderRaces(races, nextRaceName) {
            racesEl.innerHTML = '';

            if (!races.length) {
                racesEl.innerHTML = '<div class="empty-state">No race weekends available right now.</div>';
                return;
            }

            races.forEach((race, index) => {
                const block = document.createElement('details');
                block.className = 'race-block';
                block.open = nextRaceName ? race.name === nextRaceName : index === 0;

                const summary = document.createElement('summary');
                summary.className = 'race-summary';
                const weekendDate = formatWeekendDate(race.start);
                summary.innerHTML = `
                    <div class="race-main">
                        <span class="caret">${block.open ? 'v' : '>'}</span>
                        <span class="race-name">${race.name}</span>
                        ${nextRaceName === race.name ? '<span class="next-badge">Next</span>' : ''}
                    </div>
                    <span class="race-meta">${race.track} | ${weekendDate}</span>
                `;
                block.appendChild(summary);

                const rows = Object.entries(race.sessions)
                    .map(([name, when]) => ({ name: normalizeSessionLabel(name), when }))
                    .sort((a, b) => {
                        const byOrder = sessionOrder(a.name) - sessionOrder(b.name);
                        if (byOrder !== 0) {
                            return byOrder;
                        }
                        return new Date(a.when) - new Date(b.when);
                    });

                rows.forEach((session) => {
                    const parts = formatDateParts(session.when);
                    const row = document.createElement('div');
                    row.className = 'session-row';
                    row.innerHTML = `
                        <span class="session-name">${session.name}</span>
                        <span class="session-date">${parts.day}</span>
                        <span class="session-time">${parts.time}</span>
                    `;
                    block.appendChild(row);
                });

                block.addEventListener('toggle', () => {
                    const caret = block.querySelector('.caret');
                    if (caret) {
                        caret.textContent = block.open ? 'v' : '>';
                    }
                });

                racesEl.appendChild(block);
            });
        }

        async function fetchJSON(url) {
            const response = await fetch(url);
            if (!response.ok) {
                let detail = `${response.status}`;
                try {
                    const payload = await response.json();
                    if (payload.detail) {
                        detail = payload.detail;
                    }
                } catch (e) {}
                throw new Error(detail);
            }
            return response.json();
        }

        async function fetchAndRender() {
            setStatus('');
            updateTimezoneLabel();
            try {
                const [races, nextRace] = await Promise.all([
                    fetchJSON(apiUrl('/races')),
                    fetchJSON(apiUrl('/races/next')).catch(() => null)
                ]);
                const sortedRaces = [...races].sort((a, b) => new Date(a.start) - new Date(b.start));
                updateScheduleMeta(sortedRaces.length);
                renderRaces(sortedRaces, nextRace ? nextRace.name : null);
            } catch (error) {
                setStatus(`Could not load schedule: ${error.message}`);
                racesEl.innerHTML = '';
                updateScheduleMeta(0);
            }
        }

        document.getElementById('toggle-timezone').addEventListener('click', () => {
            timezoneEditor.classList.toggle('active');
        });

        timezoneEditor.addEventListener('submit', (event) => {
            event.preventDefault();
            fetchAndRender();
        });

        timezoneLabel.addEventListener('click', (event) => {
            event.preventDefault();
            timezoneEditor.classList.toggle('active');
        });

        fetchAndRender();
    </script>
</body>
</html>
