<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Calendar</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-f1">F1</span>
            <span class="logo-sep">/</span>
            <span class="logo-cal">Season Calendar</span>
        </div>
        <div class="tz-wrap">
            <div class="tz-pill" id="tz-pill">
                <span class="tz-dot"></span>
                <span id="tz-label">Local timezone</span>
                <span>&#x25BE;</span>
            </div>
            <div class="tz-panel" id="tz-panel" role="listbox" aria-label="Timezone">
                <span class="tz-panel-label">Timezone</span>
                <div class="tz-options">
                    <button class="tz-option" type="button" data-value="">Browser local timezone</button>
                    <button class="tz-option" type="button" data-value="America/Sao_Paulo">America/Sao_Paulo</button>
                    <button class="tz-option" type="button" data-value="America/New_York">America/New_York</button>
                    <button class="tz-option" type="button" data-value="America/Los_Angeles">America/Los_Angeles</button>
                    <button class="tz-option" type="button" data-value="Europe/London">Europe/London</button>
                    <button class="tz-option" type="button" data-value="Europe/Paris">Europe/Paris</button>
                    <button class="tz-option" type="button" data-value="Europe/Berlin">Europe/Berlin</button>
                    <button class="tz-option" type="button" data-value="Europe/Rome">Europe/Rome</button>
                    <button class="tz-option" type="button" data-value="Europe/Madrid">Europe/Madrid</button>
                    <button class="tz-option" type="button" data-value="Asia/Tokyo">Asia/Tokyo</button>
                    <button class="tz-option" type="button" data-value="Asia/Singapore">Asia/Singapore</button>
                    <button class="tz-option" type="button" data-value="Asia/Dubai">Asia/Dubai</button>
                    <button class="tz-option" type="button" data-value="Australia/Melbourne">Australia/Melbourne</button>
                    <button class="tz-option" type="button" data-value="UTC">UTC</button>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-label">Formula 1 World Championship</div>
        <h1>Season<br><em>Calendar</em></h1>
        <div class="hero-meta">
            <span><strong id="total-weekends">0</strong> Race Weekends</span>
            <span><strong id="total-sprints">0</strong> Sprint Events</span>
            <span id="season-range"></span>
        </div>
    </section>

    <div class="accent-bar"></div>

    <p class="status" id="status"></p>

    <section class="race-list">
        <div class="list-header">
            <span>#</span>
            <span>Grand Prix</span>
            <span></span>
            <span>Date</span>
            <span>Circuit</span>
            <span></span>
        </div>
        <div id="race-list"></div>
    </section>

    <script src="./app.js"></script>
</body>
</html>
